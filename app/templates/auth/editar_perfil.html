{% extends "base.html" %}

{% block title %}Editar Perfil{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="bi bi-pencil"></i> Editar Perfil</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.editar_perfil') }}">
                    <div class="mb-3">
                        <label for="nombre_completo" class="form-label">
                            <i class="bi bi-card-text"></i> Nombre Completo *
                        </label>
                        <input type="text" class="form-control" id="nombre_completo" name="nombre_completo"
                               value="{{ usuario.nombre_completo }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope"></i> Email *
                        </label>
                        <input type="email" class="form-control" id="email" name="email"
                               value="{{ usuario.email }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="form-label">
                            <i class="bi bi-telephone"></i> Teléfono
                        </label>
                        <input type="tel" class="form-control" id="telefono" name="telefono"
                               value="{{ usuario.telefono or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="direccion" class="form-label">
                            <i class="bi bi-geo-alt"></i> Dirección
                        </label>
                        <textarea class="form-control" id="direccion" name="direccion" rows="3">{{ usuario.direccion or '' }}</textarea>
                    </div>

                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle"></i>
                        <strong>Nota:</strong> No puedes cambiar tu nombre de usuario. Para cambiar tu contraseña,
                        <a href="{{ url_for('auth.cambiar_password') }}" class="alert-link">usa esta opción</a>.
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('auth.perfil') }}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
